<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#16181c">
<meta name="robots" content="noindex, nofollow">
<title>Block Inventory</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Block Inventory">
<style>
  :root { --bg:#f4f5f7; --card:#fff; --ink:#1a1d21; --muted:#666; --accent:#2f6fed; --line:#e3e6ea; }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
         background:var(--bg); color:var(--ink); font-size:18px; line-height:1.4;
         /* clear the iPhone status bar / Dynamic Island in standalone (home-screen) mode */
         padding-top: env(safe-area-inset-top, 0px); }
  .wrap { max-width:640px; margin:0 auto; padding:16px; }
  header { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:14px 16px; max-width:640px; margin:0 auto; }
  header h1 { font-size:19px; margin:0; }
  header a { font-size:14px; color:var(--muted); text-decoration:none; }
  .back { display:inline-block; margin-bottom:12px; color:var(--accent); text-decoration:none; font-size:16px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:18px; margin-bottom:16px; }
  h2 { margin:0 0 4px; font-size:30px; letter-spacing:0.5px; }
  h3 { margin:0 0 8px; font-size:15px; text-transform:uppercase; letter-spacing:0.5px; color:var(--muted); }
  .meta { color:var(--muted); margin-bottom:8px; }
  .loc { font-size:20px; margin-top:6px; }
  .photo { margin:14px 0 2px; }
  .photo img { width:100%; border-radius:10px; display:block; }
  .photo .ph { color:var(--muted); font-size:14px; text-align:center; padding:28px 12px;
               background:rgba(127,127,127,.08); border-radius:10px; }
  ul { margin:0; padding-left:22px; }
  li { margin:6px 0; }
  .notes { color:var(--muted); font-size:15px; }
  .empty { color:var(--muted); }
  input[type=text], input[type=password] { width:100%; padding:14px 16px; font-size:18px;
    border:1px solid var(--line); border-radius:12px; background:#fff; margin-bottom:6px; color:var(--ink); }
  button { width:100%; padding:14px; font-size:18px; font-weight:600; color:#fff; background:var(--accent);
    border:none; border-radius:12px; margin-top:12px; }
  label.remember { display:flex; align-items:center; gap:10px; margin-top:14px; font-size:16px; color:var(--muted); }
  label.remember input { width:20px; height:20px; }
  .err { color:#c0392b; margin-top:12px; min-height:22px; }
  .code { font-family: ui-monospace, Menlo, Consolas, monospace; font-size:13px; color:var(--muted);
          background:rgba(127,127,127,.14); padding:1px 6px; border-radius:5px; margin-left:4px; white-space:nowrap; }
  .row { display:flex; justify-content:space-between; gap:12px; align-items:center; padding:12px 6px; border-bottom:1px solid var(--line); }
  .row[data-box] { cursor:pointer; }
  .row[data-box]:active { background:rgba(127,127,127,.10); border-radius:8px; }
  .row .right { text-align:right; color:var(--muted); font-size:15px; }
  .row .sub { color:var(--muted); font-size:13px; }
  .row b { font-weight:600; }
  .chev { color:var(--muted); }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#16181c; --card:#20242a; --ink:#e9ebee; --muted:#9aa0a6; --line:#2f343b; }
    input[type=text], input[type=password] { background:#181b1f; }
  }
</style>
</head>
<body>

<div class="wrap" id="lock">
  <div class="card">
    <h2>🔒 Locked</h2>
    <p class="meta">Enter the passcode to view the inventory.</p>
    <form id="lockform" method="post" action="#">
      <!-- hidden username so iOS/iCloud Keychain saves & autofills the passcode (Keychain is not wiped by ITP) -->
      <input type="text" name="username" id="user" value="Block Inventory" autocomplete="username"
             readonly tabindex="-1" aria-hidden="true" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0">
      <input type="password" id="pass" name="password" placeholder="Passcode" autocomplete="current-password"
             autocapitalize="none" autocorrect="off" spellcheck="false" autofocus>
      <label class="remember"><input type="checkbox" id="remember" checked> Remember this device</label>
      <button type="submit">Unlock</button>
      <div class="err" id="err"></div>
    </form>
  </div>
</div>

<div id="app" hidden>
  <header>
    <h1><a href="#/" style="color:inherit;text-decoration:none">Block Inventory</a></h1>
    <a href="#" id="forget">Forget device</a>
  </header>
  <div class="wrap" id="view"></div>
</div>

<script>
const $ = s => document.querySelector(s);
const PP_KEY = "blockinv_pp";
let DATA = null, PHOTO_KEY = null, lastPhotoURL = null;

const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
const esc = s => (s ?? "").replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));

// ---- crypto (native Web Crypto; matches publish.py) ----
async function decryptBundle(pass) {
  const blob = await fetch("data.enc", { cache: "no-store" }).then(r => {
    if (!r.ok) throw new Error("data.enc not found");
    return r.json();
  });
  const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(pass), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: b64(blob.salt), iterations: blob.iter, hash: "SHA-256" },
    km, { name: "AES-GCM", length: 256 }, false, ["decrypt"]);
  const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv: b64(blob.iv) }, key, b64(blob.ct));
  return JSON.parse(new TextDecoder().decode(pt));
}
async function unlock(pass, remember) {
  DATA = await decryptBundle(pass);            // throws on wrong passcode
  // stable photo key (fixed salt) — matches publish.py PHOTO_SALT
  const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(pass), "PBKDF2", false, ["deriveKey"]);
  PHOTO_KEY = await crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: new TextEncoder().encode("blockinv/photos/v1"), iterations: 210000, hash: "SHA-256" },
    km, { name: "AES-GCM", length: 256 }, false, ["decrypt"]);
  if (remember) localStorage.setItem(PP_KEY, pass);
  $("#lock").hidden = true;
  $("#app").hidden = false;
  initRoute();
}

async function photoURL(id) {
  const buf = new Uint8Array(await fetch("photos/" + id + ".enc", { cache: "no-store" })
    .then(r => { if (!r.ok) throw new Error("no photo"); return r.arrayBuffer(); }));
  const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv: buf.slice(0, 12) }, PHOTO_KEY, buf.slice(12));
  return URL.createObjectURL(new Blob([pt], { type: "image/jpeg" }));
}
function loadPhoto(id) {
  photoURL(id).then(url => {
    if (lastPhotoURL) URL.revokeObjectURL(lastPhotoURL);
    lastPhotoURL = url;
    const el = document.getElementById("boxphoto");
    if (el) el.innerHTML = `<img src="${url}" alt="photo of box ${esc(id)}">`;
  }).catch(() => { document.getElementById("boxphoto")?.remove(); });
}

// ---- helpers ----
const boxLabel = id => { const n = parseInt(String(id).replace(/\D/g, ""), 10); return `${esc(id)} - Box ${isNaN(n)?"":n}`; };
function prettyLoc(loc){ if(!loc) return "Not placed yet"; const p=DATA.places[loc]; return p?.label || loc.split("/").join(" · "); }
const boxLoc = box => prettyLoc(box?.loc || "");
function itemLocation(it){ if(it.box) return {box:it.box, loc:boxLoc(DATA.boxes.find(b=>b.id===it.box))}; return {box:null, loc:prettyLoc(it.loc||"")}; }
function typeDescOf(box){ return box.type ? (DATA.types[box.type] ? DATA.types[box.type] : box.type) : ""; }

// ---- HOME: item search (name/notes/CODE) + browsable all-boxes list ----
function homeHTML(){
  return `
  <div class="card">
    <h3>Find an item</h3>
    <input type="text" id="q" placeholder="name or code, e.g. grinder or IT0007" autocomplete="off" autocapitalize="none">
    <div id="results"></div>
  </div>
  <div class="card">
    <h3>All boxes (${DATA.boxes.length})</h3>
    <input type="text" id="boxfilter" placeholder="filter by code, type or aisle" autocomplete="off" autocapitalize="none">
    <div id="boxlist"></div>
  </div>`;
}
function itemRow(i){
  const L = itemLocation(i);
  const tap = i.box ? ` data-box="${esc(i.box)}"` : "";
  const name = i.name ? esc(i.name) : `<i class="empty">(unassigned)</i>`;
  return `<div class="row"${tap}>
    <div><b>${name}</b> <span class="code">${esc(i.id)}</span></div>
    <div class="right">${i.box?esc(i.box)+" · ":""}${esc(L.loc)}${i.box?' <span class="chev">›</span>':''}</div>
  </div>`;
}
function boxRow(b){
  const n = DATA.items.filter(i=>i.box===b.id).length;
  return `<div class="row" data-box="${esc(b.id)}">
    <div><b>${boxLabel(b.id)}</b><div class="sub">${esc(typeDescOf(b))}</div></div>
    <div class="right">${esc(b.loc?boxLoc(b):"Not placed")}<div class="sub">${n} item${n!==1?"s":""}</div></div>
  </div>`;
}
function renderResults(q){
  const res=$("#results"); q=q.trim().toLowerCase();
  if(!q){ res.innerHTML=""; return; }
  const hits=DATA.items.filter(i=>
    (i.name||"").toLowerCase().includes(q) ||
    (i.notes||"").toLowerCase().includes(q) ||
    (i.id||"").toLowerCase().includes(q)).slice(0,50);
  res.innerHTML=hits.length?hits.map(itemRow).join(""):`<p class="empty">No matches.</p>`;
}
function renderBoxList(q){
  const list=$("#boxlist"); q=(q||"").trim().toLowerCase();
  const boxes=DATA.boxes.filter(b=> !q ||
    b.id.toLowerCase().includes(q) ||
    (typeDescOf(b)||"").toLowerCase().includes(q) ||
    boxLoc(b).toLowerCase().includes(q));
  list.innerHTML=boxes.length?boxes.map(boxRow).join(""):`<p class="empty">No boxes.</p>`;
}
function renderHome(){
  $("#view").innerHTML=homeHTML();
  $("#q").oninput=e=>renderResults(e.target.value);
  $("#boxfilter").oninput=e=>renderBoxList(e.target.value);
  renderBoxList("");
}

// ---- BOX detail ----
function renderBoxView(id){
  const box=DATA.boxes.find(b=>b.id===id);
  if(!box){ $("#view").innerHTML=`<a class="back" href="#/">‹ All boxes</a><div class="card"><h2>${esc(id)}</h2><p class="empty">Unknown box.</p></div>`; return; }
  const td=typeDescOf(box);
  const contents=DATA.items.filter(i=>i.box===id);
  $("#view").innerHTML=`
    <a class="back" href="#/">‹ All boxes</a>
    <div class="card">
      <h2>${boxLabel(id)}</h2>
      ${box.type?`<div class="meta">${esc(box.type)}${td?` — ${esc(td)}`:""}</div>`:""}
      <div class="loc">📍 ${esc(box.loc?boxLoc(box):"Not placed yet")}</div>
      ${(DATA.photos||[]).includes(id)?`<div class="photo" id="boxphoto"><div class="ph">Loading photo…</div></div>`:""}
      <h3 style="margin-top:18px">Contents (${contents.length})</h3>
      ${contents.length
        ? "<ul>"+contents.map(i=>`<li>${esc(i.name)}${i.qty>1?` ×${i.qty}`:""}${i.notes?` <span class="notes">${esc(i.notes)}</span>`:""} <span class="code">${esc(i.id)}</span></li>`).join("")+"</ul>"
        : `<p class="empty">No items recorded yet.</p>`}
    </div>`;
  if ((DATA.photos || []).includes(id)) loadPhoto(id);
}

// ---- routing (QR opens ?b=<id>; in-app nav uses #/b/<id>) ----
function route(){
  const m=location.hash.match(/^#\/b\/(.+)$/);
  if(m) renderBoxView(decodeURIComponent(m[1])); else renderHome();
}
function initRoute(){
  const qb=new URLSearchParams(location.search).get("b");
  if(qb) history.replaceState(null, "", location.pathname + "#/b/" + encodeURIComponent(qb));
  route();
}
$("#app").addEventListener("click", e=>{
  const row=e.target.closest("[data-box]");
  if(row) location.hash="#/b/"+encodeURIComponent(row.dataset.box);
});
window.addEventListener("hashchange", route);

// ---- lock form ----
$("#lockform").onsubmit = async e => {
  e.preventDefault();
  $("#err").textContent = "";
  try { await unlock($("#pass").value, $("#remember").checked); }
  catch { $("#err").textContent = "Wrong passcode."; }
};
$("#forget").onclick = e => { e.preventDefault(); localStorage.removeItem(PP_KEY); location.reload(); };
(async () => {                                  // auto-unlock on a remembered device
  const saved = localStorage.getItem(PP_KEY);
  if (saved) { try { await unlock(saved, true); } catch { localStorage.removeItem(PP_KEY); } }
})();

// ---- offline / installable ----
if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
</body>
</html>
